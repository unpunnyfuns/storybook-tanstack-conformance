name: Build patched

on:
  schedule:
    - cron: "41 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      rebuild: ${{ steps.compare.outputs.rebuild }}
      framework_sha: ${{ steps.compare.outputs.framework_sha }}
      source_sha: ${{ steps.compare.outputs.source_sha }}
    steps:
      - name: Compare source SHAs with the current build
        id: compare
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          framework_sha=$(gh api "repos/storybookjs/storybook/commits?sha=next&path=code/frameworks/tanstack-react&per_page=1" --jq '.[0].sha')
          source_sha=$(git ls-remote https://github.com/unpunnyfuns/storybook.git refs/heads/conformance-build | cut -c1-12)
          current=$(gh release view conformance-build --repo "$GITHUB_REPOSITORY" --json body --jq .body 2>/dev/null || echo "")
          echo "framework_sha=$framework_sha" >> "$GITHUB_OUTPUT"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
          if echo "$current" | grep -q "$framework_sha" && echo "$current" | grep -q "$source_sha"; then
            echo "No source movement; keeping the current build."
            echo "rebuild=false" >> "$GITHUB_OUTPUT"
          else
            echo "Source moved; rebuilding."
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.rebuild == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # The composed branch carries the pending fixes with their conflict
      # resolutions already recorded, so merging the upstream tip into it
      # only conflicts when upstream genuinely touches the same code. A
      # failed merge is the signal that the pending PRs need a rebase; the
      # release keeps serving the last good build until then.
      - uses: actions/checkout@v5
        with:
          repository: unpunnyfuns/storybook
          ref: conformance-build
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Merge the upstream tip
        run: |
          git config user.name conformance-bot
          git config user.email actions@users.noreply.github.com
          git remote add upstream https://github.com/storybookjs/storybook.git
          git fetch --no-tags upstream next
          git merge --no-edit upstream/next

      - name: Build the framework
        run: |
          corepack enable
          cd code
          yarn install
          npx nx run tanstack-react:compile

      - name: Pack the tarball
        id: pack
        run: |
          cd code/frameworks/tanstack-react
          base=$(node -p "require('./package.json').version")
          echo "base=$base" >> "$GITHUB_OUTPUT"
          npm pkg set version="$base-fixes.${{ github.run_number }}" \
            "dependencies.@storybook/builder-vite=^$base" \
            "dependencies.@storybook/react=^$base" \
            "dependencies.@storybook/react-vite=^$base" \
            "peerDependencies.storybook=^$base"
          mkdir -p /tmp/out
          npm pack --pack-destination /tmp/out
          mv /tmp/out/*.tgz /tmp/out/storybook-tanstack-react-patched.tgz

      - name: Publish and verify
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload conformance-build /tmp/out/storybook-tanstack-react-patched.tgz --clobber --repo "$GITHUB_REPOSITORY"
          gh release edit conformance-build --repo "$GITHUB_REPOSITORY" \
            --notes "base: ${{ steps.pack.outputs.base }} @ ${{ needs.check.outputs.framework_sha }} | source: ${{ needs.check.outputs.source_sha }} (https://github.com/unpunnyfuns/storybook/tree/conformance-build) | PRs: #35497 #35498 #35499 #35500 #35501 #35504 #35505"
          gh workflow run conformance.yml --repo "$GITHUB_REPOSITORY"
