name: Conformance

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  conformance:
    strategy:
      fail-fast: false
      matrix:
        ref: [main, next]
    runs-on: ubuntu-latest
    name: ${{ matrix.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm ci

      - name: Refresh storybook packages to their dist-tags
        run: npm update storybook @storybook/tanstack-react @storybook/addon-vitest --workspaces

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run conformance suites
        run: node scripts/conformance-report.mjs
