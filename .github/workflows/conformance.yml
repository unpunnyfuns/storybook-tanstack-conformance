name: Conformance

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  suite:
    strategy:
      fail-fast: false
      matrix:
        ref: [main, next, canary]
    runs-on: ubuntu-latest
    name: ${{ matrix.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # A fresh, lockfile-free install: the run should test the CURRENT
      # dist-tag resolutions, and resolving from scratch also avoids npm's
      # optional-dependency pruning bug (npm/cli#4828) that a lockfile
      # generated on another platform triggers.
      - name: Install current dist-tags
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run conformance suites
        run: node scripts/conformance-report.mjs

      - uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.ref }}
          path: results.json

  status:
    needs: suite
    # Publish whatever completed; a broken canary must not block the other
    # branches' badges.
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build status and badges
        run: |
          git fetch origin status || true
          node scripts/update-status.mjs

      - name: Publish to the status branch
        run: |
          git config user.name "conformance-bot"
          git config user.email "actions@users.noreply.github.com"
          git switch status 2>/dev/null || git switch --orphan status
          cp out/results.json out/badge-*.json .
          git add results.json badge-*.json
          git commit -m "status: update conformance results" || echo "no change to commit"
          git push origin status
